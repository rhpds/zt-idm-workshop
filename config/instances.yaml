---
virtualmachines:
  - name: "idmserver1"
    image: "rhel-10-0-07-09-25-3"
    bootloader: efi
    memory: "4G"
    cores: 1
    image_size: "40G"
    packages:
      - git
      - tmux
    tags:
      - key: "AnsibleGroup"
        value: "nodes"
    networks:
      - default
    services:
      - name: idm1
        ports:
          - port: 443
            protocol: TCP
            targetPort: 443
            name: idm1
    routes:
      - name: idm1
        host: idmserver1
        service: idm1
        targetPort: 443

  - name: "idmserver2"
    image: "rhel-10-0-07-09-25-3"
    bootloader: efi
    memory: "4G"
    cores: 1
    image_size: "40G"
    packages:
      - git
      - tmux
    tags:
      - key: "AnsibleGroup"
        value: "nodes"
    networks:
      - default
    services:
      - name: idm2
        ports:
          - port: 443
            protocol: TCP
            targetPort: 443
            name: idm2
    routes:
      - name: idm2
        host: idmserver2
        service: idm2
        targetPort: 443

  - name: "idmclient1"
    image: "rhel-10-0-07-09-25-3"
    bootloader: efi
    memory: "4G"
    cores: 1
    image_size: "40G"
    packages:
      - git
      - cockpit
      - tmux
    tags:
      - key: "AnsibleGroup"
        value: "bastions"
    networks:
      - default
    services:
      - name: cockpit
        ports:
          - port: 9090
            protocol: TCP
            targetPort: 9090
            name: cockpit
    routes:
      - name: cockpit
        host: idmclient1
        service: cockpit
        targetPort: 9090
        tls: true
        tls_termination: Edge
